        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .search-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .input-wrapper {
            flex: 1;
            min-width: 200px;
        }
        .input-wrapper label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .input-wrapper input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-search {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-search:active {
            transform: translateY(0);
        }
        .result-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }
        .result-box.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

            font-size: 20px;
            margin-bottom: 8px;
        }
        .user-info p {
            opacity: 0.9;
            font-size: 14px;
        }
        .role-badge {

            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }
        .scores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .score-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

            color: #666;
            margin-bottom: 10px;
            font-weight: 500;

        .score-value {
            font-size: 32px;

            color: #333;

            height: 20px;

            border-bottom: 1px solid #eee;
        }
        .data-table tr:hover {
            background: #f8f9fa;
        }

            background: #fafbfc;
        }
        .alert {
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;

        .alert-error {

                }
            }
        }
        
        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }
        
        function showResult(user) {
            const resultBox = document.getElementById('resultBox');
            
            // 显示用户基本信息
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userDept').textContent = `${user.dept4} · ${user.dept5}`;
            
            // 显示角色
            let roleText = '';
            if (user.role === 'special_manager') {
                roleText = '特殊主管';
            } else if (user.role === 'manager') {
                roleText = '主管职';
            } else {
                roleText = '非主管职';
            }
            document.getElementById('userRole').textContent = roleText;
            
            // 显示分数
            document.getElementById('scoreAiMatch').textContent = formatScore(user.ai_match);
            document.getElementById('scoreAiKpi').textContent = formatScore(user.ai_kpi);
            document.getElementById('scoreDocMatch').textContent = formatScore(user.doc_match);
            document.getElementById('scoreDocKpi').textContent = formatScore(user.doc_kpi);
            
            // 处理主管的下属数据
            const subSection = document.getElementById('subSection');
            if (user.role === 'manager' || user.role === 'special_manager') {
                const subordinates = getSubordinates(user);
                if (subordinates.length > 0) {
                    document.getElementById('subCount').textContent = subordinates.length + '人';
                    renderSubordinatesTable(subordinates);
                    subSection.style.display = 'block';
                } else {
                    subSection.style.display = 'none';
                }
            } else {
                subSection.style.display = 'none';
            }
            
            resultBox.classList.add('show');
        }
        
        function formatScore(score) {
            if (score === null || score === undefined) {
                return '<span class="null">未提交</span>';
            }
            return score.toFixed(2);
        }
        
        function getSubordinates(manager) {
            // 特殊主管优先处理
            if (manager.role === 'special_manager' && SPECIAL_MANAGERS[manager.name]) {
                const rule = SPECIAL_MANAGERS[manager.name];
                if (rule.type === 'dept4') {
                    return DATA.filter(d => d.dept4 === rule.value && d.name !== manager.name);
                } else if (rule.type === 'dept5') {
                    return DATA.filter(d => d.dept5 === rule.value && d.name !== manager.name);
                } else if (rule.type === 'multi_dept5') {
                    return DATA.filter(d => rule.value.includes(d.dept5) && d.name !== manager.name);
                }
            }
            
            // 常规主管处理
            if (manager.dept4 === '餐饮群总部') {
                // 管辖范围：与本人六级部门相同的所有成员
                return DATA.filter(d => d.dept6 === manager.dept6 && d.name !== manager.name);
            } else if (manager.dept4 === '大TQ总部') {
                // 管辖范围：与本人五级部门相同的所有成员
                return DATA.filter(d => d.dept5 === manager.dept5 && d.name !== manager.name);
            } else if (manager.dept4 === '董事长室') {
                // 管辖范围：与本人五级部门相同的所有成员
                return DATA.filter(d => d.dept5 === manager.dept5 && d.name !== manager.name);
            }
            
            return [];
        }
        
        function renderSubordinatesTable(subordinates) {
            const tbody = document.getElementById('subTableBody');
            tbody.innerHTML = '';
            
            subordinates.forEach(sub => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${sub.name}</td>
                    <td>${sub.id}</td>
                    <td>${sub.dept6 || '-'}</td>
                    <td>${sub.ai_match !== null ? sub.ai_match.toFixed(2) : '-'}</td>
                    <td>${sub.ai_kpi !== null ? sub.ai_kpi.toFixed(2) : '-'}</td>
                    <td>${sub.doc_match !== null ? sub.doc_match.toFixed(2) : '-'}</td>
                    <td>${sub.doc_kpi !== null ? sub.doc_kpi.toFixed(2) : '-'}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 回车键触发搜索
        document.getElementById('searchName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });
        document.getElementById('searchId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });
    </script>
</body>
</html>
